<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flaming Diva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rubik:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #06000E;
      width: 100vw; height: 100vh;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rubik', sans-serif;
    }
    #shader {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
      transition: opacity 0.35s ease;
    }
    .vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(4,0,12,0.82) 100%);
      z-index: 1; pointer-events: none;
    }
    .hero {
      position: relative; z-index: 2;
      width: min(1440px, 100vw); height: min(900px, 100vh);
      display: flex; flex-direction: column;
      padding: 0 80px;
    }

    /* Eyebrow */
    .eyebrow {
      display: flex; align-items: center; gap: 14px;
      margin-top: 88px;
      opacity: 0; animation: fadeUp 0.7s ease forwards 0.2s;
    }
    .eyebrow-line { width: 32px; height: 1px; background: rgba(255,80,0,0.7); flex-shrink: 0; }
    .eyebrow-text {
      font-size: 12px; font-weight: 300; letter-spacing: 0.22em;
      color: rgba(255,190,120,0.85); text-transform: uppercase;
    }

    /* Headlines */
    .headlines { margin-top: 44px; line-height: 1; }
    .flaming-wrap { opacity: 0; animation: fadeUp 0.7s ease forwards 0.45s; }
    .diva-wrap    { opacity: 0; animation: fadeUp 0.7s ease forwards 0.65s; margin-top: -16px; }

    /* Tagline */
    .tagline {
      margin-top: 28px; font-size: 17px; font-weight: 300; letter-spacing: 0.06em;
      color: rgba(230,200,255,0.78); line-height: 26px; max-width: 440px;
      opacity: 0; animation: fadeUp 0.7s ease forwards 0.85s;
    }

    /* CTA */
    .cta-row {
      display: flex; align-items: center; gap: 20px; margin-top: 28px;
      opacity: 0; animation: fadeUp 0.7s ease forwards 1.0s;
    }
    .btn-shop {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 14px 36px;
      background: linear-gradient(90deg,#FF3800,#FF006B,#9400FF);
      font-family: 'Rubik', sans-serif; font-size: 12px; font-weight: 500;
      letter-spacing: 0.18em; color: #fff; text-transform: uppercase;
      border: none; cursor: pointer;
      transition: filter 0.2s ease, transform 0.2s ease;
    }
    .btn-shop:hover { filter: brightness(1.2); transform: translateY(-2px); }
    .explore-row { display: flex; align-items: center; gap: 10px; }
    .explore-line { width: 36px; height: 1px; background: rgba(255,255,255,0.3); }
    .explore-label {
      font-size: 11px; font-weight: 300; letter-spacing: 0.16em;
      color: rgba(255,255,255,0.4); text-transform: uppercase; cursor: pointer;
      transition: color 0.2s;
    }
    .explore-label:hover { color: rgba(255,255,255,0.7); }

    /* Smoke Ring */
    #smoke-ring {
      position: absolute; top: 50px; right: -30px;
      width: 600px; height: 580px;
      z-index: 1;
      pointer-events: none;
      opacity: 0; animation: fadeIn 1.4s ease forwards 0.8s;
    }

    /* Logo */
    .logo-hero {
      position: absolute; top: 60px; right: 40px;
      width: 460px; height: 460px;
      z-index: 2;
      opacity: 0; animation: fadeIn 1.0s ease forwards 0.5s;
    }
    .logo-hero img {
      width: 100%; height: 100%; object-fit: contain;
      filter: drop-shadow(0 0 40px rgba(148,0,255,0.35)) drop-shadow(0 0 80px rgba(255,0,107,0.2));
    }

    /* Stats */
    .stats {
      position: absolute; bottom: 72px; right: 80px;
      display: flex; align-items: flex-end; gap: 48px;
      opacity: 0; animation: fadeUp 0.7s ease forwards 1.1s;
    }
    .stat { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 44px; line-height: 1; }
    .stat-label { font-size: 10px; font-weight: 300; letter-spacing: 0.18em; color: rgba(200,160,255,0.55); text-transform: uppercase; }
    .stat-divider { width: 1px; height: 40px; background: linear-gradient(to bottom, transparent, rgba(255,80,150,0.4), transparent); }

    /* ── Shader switcher ── */
    .shader-switcher {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px; z-index: 10;
      background: rgba(0,0,0,0.5);
      padding: 5px;
      border: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      opacity: 0; animation: fadeIn 0.8s ease forwards 1.4s;
    }
    .sh-btn {
      padding: 9px 22px;
      font-family: 'Rubik', sans-serif; font-size: 10px; font-weight: 400;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer; transition: all 0.2s ease;
    }
    .sh-btn:hover { color: rgba(255,255,255,0.75); border-color: rgba(255,255,255,0.25); }
    .sh-btn.active {
      color: #fff;
      background: linear-gradient(90deg, rgba(255,56,0,0.85), rgba(148,0,255,0.85));
      border-color: transparent;
    }

    /* Shader name label */
    .shader-label {
      position: fixed; top: 24px; right: 32px; z-index: 10;
      font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 0.22em;
      color: rgba(255,255,255,0.25); text-transform: uppercase;
      transition: opacity 0.3s ease;
    }

    @keyframes fadeUp  { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
  </style>
</head>
<body>

<canvas id="shader"></canvas>
<div class="vignette"></div>
<div class="shader-label" id="shader-label">Plasma</div>

<div class="hero">
  <div class="eyebrow">
    <div class="eyebrow-line"></div>
    <span class="eyebrow-text">Est. 2019 &nbsp;·&nbsp; One of a Kind Patch Designs</span>
    <div class="eyebrow-line"></div>
  </div>

  <div class="headlines">
    <div class="flaming-wrap">
      <svg width="1100" height="220" viewBox="0 0 1100 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#FF3A00"/>
            <stop offset="40%"  stop-color="#FF007A"/>
            <stop offset="100%" stop-color="#9B00FF"/>
          </linearGradient>
        </defs>
        <text x="0" y="200" font-family="'Bebas Neue',sans-serif" font-size="220" font-weight="400"
          letter-spacing="-2" fill="none" stroke="url(#strokeGrad)" stroke-width="2">FLAMING</text>
      </svg>
    </div>
    <div class="diva-wrap">
      <svg width="820" height="270" viewBox="0 0 820 270" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="divaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#FF6B00"/>
            <stop offset="28%"  stop-color="#FF0051"/>
            <stop offset="62%"  stop-color="#CF00FF"/>
            <stop offset="100%" stop-color="#00D4FF"/>
          </linearGradient>
        </defs>
        <text x="0" y="250" font-family="'Bebas Neue',sans-serif" font-size="270"
          letter-spacing="-4" fill="url(#divaGrad)">DIVA</text>
      </svg>
    </div>
  </div>

  <p class="tagline">
    Wearable art for the unapologetically bold.<br/>
    Hand-crafted embroidery patches &amp; apparel.
  </p>

  <div class="cta-row">
    <button class="btn-shop">Shop Collection</button>
    <div class="explore-row">
      <div class="explore-line"></div>
      <span class="explore-label">Explore</span>
    </div>
  </div>

  <!-- Smoke Ring -->
  <canvas id="smoke-ring"></canvas>

  <!-- Logo -->
  <div class="logo-hero">
    <picture>
      <source srcset="images/logo.webp" type="image/webp"/>
      <img src="images/logo-fullsize.png" alt="Flaming Diva"/>
    </picture>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <span class="stat-num" style="background:linear-gradient(90deg,#FF3800,#FF006B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">500+</span>
      <span class="stat-label">Unique Designs</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-num" style="background:linear-gradient(90deg,#CF00FF,#00D4FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">10K</span>
      <span class="stat-label">Happy Customers</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-num" style="background:linear-gradient(90deg,#FF6B00,#FF3800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">100%</span>
      <span class="stat-label">Handmade</span>
    </div>
  </div>
</div>

<!-- Shader switcher -->
<div class="shader-switcher">
  <button class="sh-btn active" data-idx="0">Plasma</button>
  <button class="sh-btn"        data-idx="1">Lava</button>
  <button class="sh-btn"        data-idx="2">Aurora</button>
  <button class="sh-btn"        data-idx="3">Acid</button>
  <button class="sh-btn"        data-idx="4">Void</button>
</div>

<script>
// ─────────────────────────────────────────────
// Smoke Ring — standalone WebGL canvas
// ─────────────────────────────────────────────
(function() {
  const sc = document.getElementById('smoke-ring');
  sc.width  = Math.round(sc.offsetWidth  * devicePixelRatio) || 1160;
  sc.height = Math.round(sc.offsetHeight * devicePixelRatio) || 1040;

  const sg = sc.getContext('webgl', { alpha: true, premultipliedAlpha: false });
  if (!sg) return;

  sg.enable(sg.BLEND);
  sg.blendFunc(sg.SRC_ALPHA, sg.ONE_MINUS_SRC_ALPHA);
  sg.clearColor(0, 0, 0, 0);
  sg.viewport(0, 0, sc.width, sc.height);

  const SMOKE_VERT = `
    attribute vec2 a_pos;
    void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
  `;

  // ── Tweakable params — adjust in browser console via window.SMOKE ──
  window.SMOKE = {
    intensity : 1.10,   // overall opacity multiplier (try 0.5–2.0)
    power     : 0.52,   // density curve — lower = thicker/more opaque (try 0.3–1.2)
    radius    : 0.55,   // envelope size — higher = wider smoke (try 0.5–1.0)
    speed     : 0.07,   // animation speed (try 0.03–0.20)
    warp      : 5.5,    // domain warp strength — higher = more swirling (try 1.0–6.0)
  };

  const SMOKE_FRAG = `
    precision mediump float;
    uniform float u_time;
    uniform vec2  u_res;
    uniform float u_intensity;
    uniform float u_power;
    uniform float u_radius;
    uniform float u_warp;
    uniform float u_speed;

    vec2 _h2(vec2 p) {
      p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
      return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);
    }
    float _n(vec2 p) {
      vec2 i = floor(p), f = fract(p), u = f * f * (3.0 - 2.0 * f);
      return mix(
        mix(dot(_h2(i),            f           ), dot(_h2(i + vec2(1,0)), f - vec2(1,0)), u.x),
        mix(dot(_h2(i + vec2(0,1)), f - vec2(0,1)), dot(_h2(i + vec2(1,1)), f - vec2(1,1)), u.x),
        u.y);
    }
    float _fbm(vec2 p) {
      float v = 0.0, a = 0.5;
      for (int i = 0; i < 5; i++) { v += a * _n(p); p = p * 2.1 + vec2(1.7, 9.2); a *= 0.5; }
      return v;
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / u_res;
      // Center on the logo — slightly below midpoint so smoke pools naturally
      vec2 p  = uv - vec2(0.5, 0.52);
      float aspect = u_res.x / u_res.y;
      p.x *= aspect;

      float t = u_time * u_speed;
      float r = length(p);

      // Layer 1: slow large-scale warp
      vec2 q = vec2(
        _fbm(p * 1.8 + vec2(t,       t * 0.6)),
        _fbm(p * 1.8 + vec2(t * 0.7, -t * 0.5) + vec2(5.2, 1.3))
      );

      // Layer 2: driven by layer 1 — swirling pockets
      vec2 r2 = vec2(
        _fbm(p * 3.0 + u_warp * q + vec2(1.7, 9.2) + t * 0.12),
        _fbm(p * 3.0 + u_warp * q + vec2(8.3, 2.8) - t * 0.10)
      );

      // Final density
      float density = _fbm(p * 2.2 + 3.0 * r2 + t * 0.08) * 0.5 + 0.5;

      // Radial envelope
      float envelope = smoothstep(u_radius, 0.02, r);

      float smoke = envelope * density;
      smoke *= 0.80 + 0.20 * smoothstep(0.18, -0.22, p.y);
      smoke = pow(clamp(smoke, 0.0, 1.0), u_power);

      gl_FragColor = vec4(0.98, 0.97, 0.96, clamp(smoke * u_intensity, 0.0, 1.0));
    }
  `;

  function _compSm(type, src) {
    const s = sg.createShader(type);
    sg.shaderSource(s, src); sg.compileShader(s);
    if (!sg.getShaderParameter(s, sg.COMPILE_STATUS)) console.warn(sg.getShaderInfoLog(s));
    return s;
  }

  const smProg = sg.createProgram();
  sg.attachShader(smProg, _compSm(sg.VERTEX_SHADER,   SMOKE_VERT));
  sg.attachShader(smProg, _compSm(sg.FRAGMENT_SHADER, SMOKE_FRAG));
  sg.linkProgram(smProg);

  const smBuf = sg.createBuffer();
  sg.bindBuffer(sg.ARRAY_BUFFER, smBuf);
  sg.bufferData(sg.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), sg.STATIC_DRAW);

  const smPos       = sg.getAttribLocation(smProg,  'a_pos');
  const smTime      = sg.getUniformLocation(smProg, 'u_time');
  const smRes       = sg.getUniformLocation(smProg, 'u_res');
  const smSpeed     = sg.getUniformLocation(smProg, 'u_speed');
  const smIntensity = sg.getUniformLocation(smProg, 'u_intensity');
  const smPower     = sg.getUniformLocation(smProg, 'u_power');
  const smRadius    = sg.getUniformLocation(smProg, 'u_radius');
  const smWarp      = sg.getUniformLocation(smProg, 'u_warp');
  const smStart     = performance.now();

  function smokeFrame() {
    sg.clear(sg.COLOR_BUFFER_BIT);
    sg.useProgram(smProg);
    sg.bindBuffer(sg.ARRAY_BUFFER, smBuf);
    sg.enableVertexAttribArray(smPos);
    sg.vertexAttribPointer(smPos, 2, sg.FLOAT, false, 0, 0);
    const S = window.SMOKE;
    sg.uniform1f(smTime,      (performance.now() - smStart) / 1000);
    sg.uniform2f(smRes,       sc.width, sc.height);
    sg.uniform1f(smSpeed,     S.speed);
    sg.uniform1f(smIntensity, S.intensity);
    sg.uniform1f(smPower,     S.power);
    sg.uniform1f(smRadius,    S.radius);
    sg.uniform1f(smWarp,      S.warp);
    sg.drawArrays(sg.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(smokeFrame);
  }
  smokeFrame();
})();

// ─────────────────────────────────────────────
// Shared vertex shader
// ─────────────────────────────────────────────
const VERT = `
  attribute vec2 a_pos;
  void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

// ─────────────────────────────────────────────
// Shared noise helpers (prepended to each frag)
// ─────────────────────────────────────────────
const NOISE_LIB = `
  precision mediump float;
  uniform float u_time;
  uniform vec2  u_res;

  vec2 _h2(vec2 p) {
    p = vec2(dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)));
    return -1.0 + 2.0*fract(sin(p)*43758.5453123);
  }
  float _n(vec2 p) {
    vec2 i=floor(p); vec2 f=fract(p);
    vec2 u=f*f*(3.0-2.0*f);
    return mix(mix(dot(_h2(i+vec2(0,0)),f-vec2(0,0)),dot(_h2(i+vec2(1,0)),f-vec2(1,0)),u.x),
               mix(dot(_h2(i+vec2(0,1)),f-vec2(0,1)),dot(_h2(i+vec2(1,1)),f-vec2(1,1)),u.x),u.y);
  }
  float _fbm(vec2 p) {
    float v=0.0,a=0.5;
    for(int i=0;i<5;i++){v+=a*_n(p);p=p*2.1+vec2(1.7,9.2);a*=0.5;}
    return v;
  }
  float _hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
`;

// ─────────────────────────────────────────────
// 1. PLASMA — warped FBM, fire-psychedelic
// ─────────────────────────────────────────────
const FRAG_PLASMA = NOISE_LIB + `
  vec3 _palette(float t) {
    vec3 a=vec3(0.04,0.00,0.10), b=vec3(0.60,0.10,0.50);
    vec3 c=vec3(0.80,0.30,0.60), d=vec3(0.00,0.50,1.00);
    return a + b*cos(6.28318*(c*t+d));
  }
  void main() {
    vec2 uv=(gl_FragCoord.xy-0.5*u_res)/min(u_res.x,u_res.y);
    float t=u_time*0.18;
    vec2 q=vec2(_fbm(uv+t), _fbm(uv+vec2(1.0)));
    vec2 r=vec2(_fbm(uv+4.0*q+vec2(1.7,9.2)+0.15*t),
                _fbm(uv+4.0*q+vec2(8.3,2.8)+0.126*t));
    float f=_fbm(uv+4.0*r);
    f=pow(clamp(f*0.5+0.5,0.0,1.0),1.4);
    vec3 col=_palette(f+0.1*t);
    float vign=1.0-smoothstep(0.5,1.4,length(uv));
    col*=vign*0.9+0.1;
    gl_FragColor=vec4(col,1.0);
  }
`;

// ─────────────────────────────────────────────
// 2. LAVA — slow molten rock, reds/oranges
// ─────────────────────────────────────────────
const FRAG_LAVA = NOISE_LIB + `
  void main() {
    vec2 uv=(gl_FragCoord.xy-0.5*u_res)/min(u_res.x,u_res.y);
    float t=u_time*0.07;
    vec2 q=vec2(_fbm(uv*1.2+vec2(t,0.0)), _fbm(uv*1.2+vec2(0.0,t*0.7)));
    float f=_fbm(uv*1.0+2.5*q+vec2(t*0.4,-t*0.3));
    f=clamp(f*0.5+0.5,0.0,1.0);

    // Lava palette: dark → crimson → orange → yellow tip
    vec3 col=mix(vec3(0.0),        vec3(0.22,0.0,0.0),  smoothstep(0.0,0.38,f));
    col=mix(col, vec3(0.65,0.04,0.0), smoothstep(0.33,0.58,f));
    col=mix(col, vec3(1.0,0.28,0.0),  smoothstep(0.52,0.72,f));
    col=mix(col, vec3(1.0,0.85,0.15), smoothstep(0.68,0.92,f));
    // Inner glow bloom
    col+=vec3(0.6,0.08,0.0)*pow(f,5.0)*0.7;
    // Emissive heat shimmer
    float shimmer=_n(uv*8.0+vec2(t*2.0,0.0))*0.5+0.5;
    col+=vec3(0.3,0.04,0.0)*shimmer*pow(f,3.0)*0.4;

    float vign=1.0-smoothstep(0.35,1.3,length(uv));
    col*=vign*0.85+0.15;
    gl_FragColor=vec4(clamp(col,0.0,1.0),1.0);
  }
`;

// ─────────────────────────────────────────────
// 3. AURORA — northern lights with star field
// ─────────────────────────────────────────────
const FRAG_AURORA = NOISE_LIB + `
  void main() {
    vec2 uv=gl_FragCoord.xy/u_res;
    float t=u_time*0.22;

    // Deep night sky
    vec3 col=vec3(0.004,0.008,0.04);
    // Subtle horizon gradient
    col+=vec3(0.0,0.015,0.04)*(1.0-uv.y)*0.5;

    // 5 aurora ribbon layers
    for(int i=0;i<5;i++){
      float fi=float(i);
      float yc  =0.22+fi*0.11+0.055*sin(t*0.28+fi*1.92);
      float freq =2.5+fi*1.6;
      float amp  =0.038+fi*0.014;
      float wave =yc+amp*sin(uv.x*freq*6.28318+t*(0.14+fi*0.07)+fi*2.1);
      float dist =abs(uv.y-wave);
      float band =exp(-dist*24.0)*(0.35+0.38*sin(t*0.7+fi*1.05+uv.x*4.5));
      // Hue cycles softly
      float hue=fi*0.18+t*0.035;
      vec3 aCol=0.5+0.5*cos(6.28318*(hue+vec3(0.0,0.33,0.67)));
      col+=band*aCol*0.9;
    }

    // Fine star field with twinkle
    vec2 sg=floor(uv*380.0);
    float sh=_hash(sg);
    float tw=0.5+0.5*sin(t*2.8+_hash(sg+0.3)*6.28318);
    col+=step(0.991,sh)*tw*vec3(0.65,0.75,1.0)*0.7;
    // Larger dim stars
    vec2 sg2=floor(uv*90.0);
    col+=step(0.955,_hash(sg2+5.0))*_hash(sg2+6.0)*vec3(0.4,0.5,0.9)*0.25;

    col=clamp(col,0.0,1.0);
    gl_FragColor=vec4(col,1.0);
  }
`;

// ─────────────────────────────────────────────
// 4. ACID — kaleidoscope interference, vivid rainbow
// ─────────────────────────────────────────────
const FRAG_ACID = NOISE_LIB + `
  void main() {
    vec2 uv=(gl_FragCoord.xy-0.5*u_res)/min(u_res.x,u_res.y);
    float t=u_time*0.38;

    // Slow rotation
    float ca=cos(t*0.15), sa=sin(t*0.15);
    uv=vec2(ca*uv.x-sa*uv.y, sa*uv.x+ca*uv.y);

    // Kaleidoscope fold — 8 sectors
    float a=atan(uv.y,uv.x);
    float r=length(uv);
    float sector=3.14159/8.0;
    a=mod(a,sector*2.0);
    a=abs(a-sector);
    uv=r*vec2(cos(a),sin(a));

    // Multi-layer interference
    float f=0.0;
    f+=sin(uv.x*4.5+t)*cos(uv.y*3.2-t*0.9);
    f+=sin(uv.x*3.1-t*0.7+uv.y*2.4)*0.65;
    f+=cos(length(uv)*6.0-t*1.3)*0.55;
    f+=sin((uv.x+uv.y)*3.0+t*0.8)*0.4;
    f+=cos(uv.x*uv.y*1.5+t*1.1)*0.25;
    f=f*0.2+0.5;

    // Vivid rainbow with time drift
    vec3 col=0.5+0.5*cos(6.28318*(f+t*0.1+vec3(0.0,0.33,0.67)));
    // Boost saturation
    float lum=dot(col,vec3(0.299,0.587,0.114));
    col=mix(vec3(lum),col,1.85);
    col=pow(clamp(col,0.0,1.0),vec3(0.82));
    // Slight center darkening to avoid pure white
    col*=0.85+0.15*smoothstep(0.0,0.6,r);

    gl_FragColor=vec4(col,1.0);
  }
`;

// ─────────────────────────────────────────────
// 5. VOID — deep space nebula with star layers
// ─────────────────────────────────────────────
const FRAG_VOID = NOISE_LIB + `
  float _fbm4(vec2 p) {
    float v=0.0,a=0.5;
    for(int i=0;i<4;i++){v+=a*_n(p);p=p*2.0+vec2(1.7,9.2);a*=0.5;}
    return v;
  }
  void main() {
    vec2 uv=gl_FragCoord.xy/u_res;
    float t=u_time*0.045;

    // Three slow nebula layers
    float n1=_fbm4(uv*2.1+vec2(t, t*0.55))*0.5+0.5;
    float n2=_fbm4(uv*3.4+vec2(-t*0.7, t*1.0)+vec2(5.1,1.3))*0.5+0.5;
    float n3=_fbm4(uv*1.4+vec2(t*0.3,-t*0.4)+vec2(1.8,3.9))*0.5+0.5;

    // Deep space base
    vec3 col=vec3(0.007,0.010,0.030);
    col+=vec3(0.0,  0.035,0.16)*n1*0.55;   // blue wisps
    col+=vec3(0.12, 0.0,  0.20)*n2*0.65;   // violet nebula
    col+=vec3(0.16, 0.0,  0.10)*n1*n2*0.9; // magenta overlap
    col+=vec3(0.0,  0.06, 0.12)*n3*0.4;    // teal veil
    // Bright nebula core where layers collide
    col+=vec3(0.28,0.08,0.45)*pow(n1*n2,2.8)*1.3;
    col+=vec3(0.0, 0.18,0.35)*pow(n2*n3,2.5)*0.8;

    // Fine star field — twinkling
    vec2 sp=floor(uv*520.0);
    float sh=_hash(sp);
    float tw=0.55+0.45*sin(t*90.0+_hash(sp+0.4)*6.28318);
    col+=step(0.993,sh)*tw*vec3(0.6,0.75,1.0)*0.9;
    // Medium stars with glow
    vec2 sp2=floor(uv*130.0);
    float sh2=_hash(sp2+10.0);
    col+=step(0.958,sh2)*_hash(sp2+11.0)*vec3(0.85,0.8,1.0)*0.32;

    col=clamp(col,0.0,1.0);
    gl_FragColor=vec4(col,1.0);
  }
`;

// ─────────────────────────────────────────────
// WebGL setup
// ─────────────────────────────────────────────
const canvas = document.getElementById('shader');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  if (gl) gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

if (!gl) {
  canvas.style.display = 'none';
  document.body.style.background = 'linear-gradient(135deg,#06000E 0%,#1a003a 40%,#3d0020 70%,#06000E 100%)';
} else {
  function compileShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
      console.warn(gl.getShaderInfoLog(s));
    return s;
  }

  const vertShader = compileShader(gl.VERTEX_SHADER, VERT);

  const FRAGS = [FRAG_PLASMA, FRAG_LAVA, FRAG_AURORA, FRAG_ACID, FRAG_VOID];
  const NAMES = ['Plasma', 'Lava', 'Aurora', 'Acid', 'Void'];

  const programs = FRAGS.map(fragSrc => {
    const prog = gl.createProgram();
    gl.attachShader(prog, vertShader);
    gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, fragSrc));
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
      console.warn(gl.getProgramInfoLog(prog));
    return {
      prog,
      uTime: gl.getUniformLocation(prog, 'u_time'),
      uRes:  gl.getUniformLocation(prog, 'u_res'),
      aPos:  gl.getAttribLocation(prog, 'a_pos'),
    };
  });

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

  let current = 0;
  let start = performance.now();

  function frame() {
    const p = programs[current];
    gl.useProgram(p.prog);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.enableVertexAttribArray(p.aPos);
    gl.vertexAttribPointer(p.aPos, 2, gl.FLOAT, false, 0, 0);
    const t = (performance.now() - start) / 1000;
    gl.uniform1f(p.uTime, t);
    gl.uniform2f(p.uRes, canvas.width, canvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(frame);
  }
  frame();

  // ── Switcher buttons ──────────────────────────
  const buttons = document.querySelectorAll('.sh-btn');
  const label   = document.getElementById('shader-label');
  let switching = false;

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      if (idx === current || switching) return;
      switching = true;

      // Fade out
      canvas.style.opacity = '0';
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      label.style.opacity = '0';

      setTimeout(() => {
        current = idx;
        canvas.style.opacity = '1';
        label.textContent = NAMES[idx];
        setTimeout(() => { label.style.opacity = '1'; switching = false; }, 350);
      }, 350);
    });
  });
}
</script>
</body>
