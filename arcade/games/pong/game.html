<!DOCTYPE html>
<html>
<head>
	<title>Pong in HTML5! | Daverix.net</title>
	<meta name="description" content="The classic Pong game made with the HTML5 elements canvas and audio!" />
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />	
	<link rel="stylesheet" href="style.css" />
	<!--[if IE]><script type="text/javascript" src="excanvas.js"></script><![endif]-->
	<style>
		html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #150000; display: flex; align-items: center; justify-content: center; }
		#gamediv { transform-origin: center center; }
	</style>
</head>
<body>

<div id="gamediv">
	<div id="playScreen">
		<canvas width="640" height="360" id="gameCanvas"></canvas>
		<div id="computerScore">0</div>
		<div id="playerScore">0</div>
		<div id="pauseText">Paused</div>
	</div>
</div>

<audio id="bounceLeft" autobuffer>
	<source src="ping.wav" type="audio/x-wav" />
	<source src="ping.ogg" type="audio/ogg" />
</audio>
<audio id="bounceRight" autobuffer>
	<source src="pong.wav" type="audio/x-wav" />
	<source src="pong.ogg" type="audio/ogg" />
</audio>
<audio id="bounceWall" autobuffer>
	<source src="bom.wav" type="audio/x-wav" />
	<source src="bom.ogg" type="audio/ogg" />
</audio>

<script type="text/javascript" src="game.js"></script>
<script>
	// Scale #gamediv to fill the window, preserving aspect ratio
	// gamediv is 640px wide + 20px padding = 660 total, 360 + 20 = 380 total
	function scaleGame() {
		var scale = Math.min(window.innerWidth / 660, window.innerHeight / 380);
		document.getElementById('gamediv').style.transform = 'scale(' + scale + ')';
	}
	scaleGame();
	window.addEventListener('resize', scaleGame);
</script>


</body>
</html>
