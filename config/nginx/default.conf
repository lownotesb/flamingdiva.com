# Any request to / with query params must go to WordPress, not the landing page.
# This covers /?oxygen=builder&id=X (Oxygen builder), /?page_id=X (draft pages),
# /?p=X (posts), and any other WP front-end query strings.
map $request_uri $bypass_landing_page {
    ~^/\?   1;   # / followed by ? with anything → WordPress
    default  0;
}

server {
    listen 80;

    if ($bypass_landing_page) {
        rewrite ^ /_wp_builder last;
    }

    location = /_wp_builder {
        internal;
        proxy_pass http://wordpress/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Landing page — exact root only (no query string / non-builder requests)
    location = / {
        root /var/www/landingpage;
        try_files /index.html =404;
    }

    # Landing page assets (also served at /landingpage/ for cross-page relative paths)
    location /landingpage/ {
        alias /var/www/landingpage/;
    }

    # Shared assets (bg-shader.js, etc.)
    location /shared/ {
        alias /var/www/shared/;
    }

    # Shared images (logos, etc.)
    location /images/ {
        alias /var/www/images/;
    }

    # Arcade games
    location /arcade/ {
        alias /var/www/arcade/;
    }

    # Diva's Game Room
    location /divas-game-room/ {
        alias /var/www/divas-game-room/;
        index index.html;
        try_files $uri $uri/ /divas-game-room/index.html;
    }

    # Diva's Disco
    location /divas-disco/ {
        alias /var/www/divas-disco/;
        index index.html;
        try_files $uri $uri/ /divas-disco/index.html;
    }

    # WordPress — catch-all
    location / {
        proxy_pass http://wordpress/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
