server {
    listen 80;

    # Landing page at root
    location / {
        root /var/www/landingpage;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Landing page assets — also served at /landingpage/ for cross-page relative paths
    location /landingpage/ {
        alias /var/www/landingpage/;
    }

    # Shared assets (bg-shader.js, etc.)
    location /shared/ {
        alias /var/www/shared/;
    }

    # Arcade games (static assets — game iframes only)
    location /arcade/ {
        alias /var/www/arcade/;
    }

    # Diva's Game Room
    location /divas-game-room/ {
        alias /var/www/divas-game-room/;
        index index.html;
        try_files $uri $uri/ /divas-game-room/index.html;
    }

    # Diva's Disco
    location /divas-disco/ {
        alias /var/www/divas-disco/;
        index index.html;
        try_files $uri $uri/ /divas-disco/index.html;
    }

    # Redirect bare WordPress paths back to /shop/ prefix
    location ~* ^/(wp-admin|wp-login\.php|wp-content|wp-includes|wp-json|wp-cron\.php) {
        return 301 $scheme://$http_host/shop$request_uri;
    }

    # Redirect /shop → /shop/ (no trailing slash fix)
    location = /shop {
        return 301 /shop/;
    }

    # WordPress store at /shop/
    location /shop/ {
        proxy_pass http://wordpress/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
